<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kleingewerbe Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial; background:#f6f6f7; margin:0; }
    .card { max-width: 520px; margin: 60px auto; background:#fff; border-radius:18px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
    h1 { margin: 0 0 10px; font-size: 34px; }
    .btn { width:100%; border:0; padding:16px 18px; border-radius:14px; font-size:18px; cursor:pointer; }
    .btn-black { background:#111; color:#fff; }
    .btn-gray { background:#eee; color:#111; }
    .row { display:flex; gap:10px; }
    .row .btn { flex:1; }
    .muted { color:#666; font-size:14px; }
    .status { margin-top:14px; font-size:16px; padding:10px 12px; border-radius:12px; background:#f2f2f3; }
    input { width:100%; padding:14px 14px; border-radius:12px; border:1px solid #ddd; font-size:16px; }
    .sep { height:1px; background:#eee; margin:18px 0; }
    .small { font-size:12px; color:#666; line-height:1.4; }
    .ok { color:#0a7; font-weight:600; }
    .bad { color:#c00; font-weight:600; }
    .log { margin-top:10px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size:12px; white-space:pre-wrap; color:#333; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Kleingewerbe Pro</h1>
    <div class="muted">Cloud-Speicherung (Supabase) – Login</div>

    <div style="margin-top:16px">
      <button id="btnGithub" class="btn btn-black">Mit GitHub einloggen</button>
    </div>

    <div class="sep"></div>

    <div class="muted" style="margin-bottom:8px">Backup: Login per E-Mail (Magic Link)</div>
    <input id="email" type="email" inputmode="email" placeholder="deine@email.de" />
    <div style="margin-top:10px" class="row">
      <button id="btnEmail" class="btn btn-gray">Link senden</button>
      <button id="btnLogout" class="btn btn-gray">Logout</button>
    </div>

    <div style="margin-top:10px">
      <button id="btnReset" class="btn btn-gray">Reset / Cache löschen</button>
    </div>

    <div id="status" class="status">⏳ Starte…</div>
    <div id="debug" class="log"></div>

    <div class="small" style="margin-top:14px">
      Tipp: Wenn du im <b>Privaten Surfen</b> bist oder der Link in einer App (Instagram/TikTok) geöffnet wurde,
      kann Safari Storage blockieren → dann in Safari direkt öffnen.
    </div>
  </div>

<script>
  // ✅ Deine Supabase Daten
  const SUPABASE_URL = "https://szcgehcjdnilykynqhqf.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6Y2dlaGNqZG5pbHlreW5xaHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwOTkwODgsImV4cCI6MjA4NzY3NTA4OH0.46uxkT1a9GhyDqEBlWJBqoIhfsthyLC2dg_nEDMWdJo";

  // ✅ Redirect automatisch korrekt (egal ob /EBay-App/ oder /EBay-App/index.html)
  const REDIRECT_TO = window.location.origin + window.location.pathname;

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
      flowType: "pkce"
    }
  });

  const $ = (id) => document.getElementById(id);
  const log = (msg) => { $("debug").textContent = (new Date().toLocaleTimeString()+"  "+msg+"\n") + $("debug").textContent; };
  const setStatus = (html) => { $("status").innerHTML = html; };

  async function refreshUI() {
    try {
      const { data, error } = await supabase.auth.getSession();
      if (error) {
        setStatus(`❌ Session Fehler: <span class="bad">${error.message}</span>`);
        log("getSession ERROR: " + error.message);
        return;
      }
      if (data.session) {
        const u = data.session.user;
        setStatus(`✅ Eingeloggt als <span class="ok">${u.email || u.user_metadata?.user_name || u.id}</span>`);
        log("SESSION OK user=" + (u.email || u.id));
      } else {
        setStatus(`❌ Nicht eingeloggt`);
        log("No session.");
      }
    } catch (e) {
      setStatus(`❌ Unerwarteter Fehler: <span class="bad">${e.message}</span>`);
      log("refreshUI EXCEPTION: " + e.message);
    }
  }

  // ✅ WICHTIG: Auth-Änderungen mitbekommen
  supabase.auth.onAuthStateChange((event, session) => {
    log("AuthStateChange: " + event + (session ? " (session)" : ""));
    refreshUI();
  });

  // ✅ GitHub Login
  $("btnGithub").addEventListener("click", async () => {
    try {
      setStatus("⏳ Öffne GitHub Login…");
      log("Starting OAuth GitHub. redirectTo=" + REDIRECT_TO);
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: "github",
        options: { redirectTo: REDIRECT_TO }
      });
      if (error) {
        setStatus(`❌ OAuth Fehler: <span class="bad">${error.message}</span>`);
        log("OAuth ERROR: " + error.message);
      } else {
        log("OAuth started. data=" + JSON.stringify(data));
      }
    } catch (e) {
      setStatus(`❌ OAuth Exception: <span class="bad">${e.message}</span>`);
      log("OAuth EXCEPTION: " + e.message);
    }
  });

  // ✅ Email Magic Link
  $("btnEmail").addEventListener("click", async () => {
    const email = $("email").value.trim();
    if (!email) return setStatus("❌ Bitte Email eintragen.");
    try {
      setStatus("⏳ Sende Magic Link…");
      log("Sending magic link to " + email + " redirectTo=" + REDIRECT_TO);
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: REDIRECT_TO }
      });
      if (error) {
        setStatus(`❌ Email Fehler: <span class="bad">${error.message}</span>`);
        log("OTP ERROR: " + error.message);
      } else {
        setStatus(`✅ Link gesendet! Öffne die Email und tippe den Link an.`);
        log("OTP sent OK");
      }
    } catch (e) {
      setStatus(`❌ OTP Exception: <span class="bad">${e.message}</span>`);
      log("OTP EXCEPTION: " + e.message);
    }
  });

  // ✅ Logout
  $("btnLogout").addEventListener("click", async () => {
    await supabase.auth.signOut();
    setStatus("✅ Ausgeloggt");
    log("Signed out");
    refreshUI();
  });

  // ✅ Reset (löscht Supabase local storage + URL params)
  $("btnReset").addEventListener("click", async () => {
    try {
      log("RESET pressed. Clearing storage.");
      localStorage.clear();
      sessionStorage.clear();
      // entfernt Token-Fragmente aus URL
      history.replaceState({}, document.title, REDIRECT_TO);
      setStatus("✅ Reset fertig. Seite lädt neu…");
      setTimeout(() => location.reload(true), 250);
    } catch (e) {
      setStatus(`❌ Reset Fehler: <span class="bad">${e.message}</span>`);
      log("RESET ERROR: " + e.message);
    }
  });

  // Start
  log("App loaded. UA=" + navigator.userAgent);
  refreshUI();
</script>

</body>
</html>
