<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kleingewerbe Pro</title>
<style>
body{font-family:Arial;background:#f2f2f2;margin:0}
.nav{display:flex;background:#000}
.nav button{flex:1;padding:12px;border:none;background:#000;color:#fff;font-size:12px}
.section{display:none;padding:15px}
.active{display:block}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid #ddd;padding:8px}
.sold{color:gray;text-decoration:line-through}
.right{text-align:right}
.bold{font-weight:bold}
</style>
</head>
<body>

<div class="nav">
<button onclick="showTab('lager')">📦 Lager</button>
<button onclick="showTab('verkauf')">💰 Verkauf</button>
<button onclick="showTab('übersicht')">📊 Übersicht</button>
</div>

<div id="lager" class="section active">
<div class="card">
<h2>Lagerbestand</h2>
<div id="lagerTable"></div>
</div>
</div>

<div id="verkauf" class="section">
<div class="card">
<h2>Artikel verkaufen</h2>
<select id="sellSelect"></select>
<input id="sellPrice" placeholder="Verkaufspreis €">
<button onclick="sell()">Verkaufen</button>
<div id="result"></div>
</div>
</div>

<div id="übersicht" class="section">
<div class="card">
<h2>Übersicht</h2>
<div id="overview"></div>
</div>
</div>

<script>

function showTab(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function parse(n){return parseFloat(String(n).replace(",", "."))||0}
function money(n){return n.toFixed(2).replace(".", ",")}

let inventory=[
{id:1,name:"N3DS XL Black",ek:198.89,plattform:"Vinted",sold:false},
{id:2,name:"N3DS XL Blau",ek:167.39,plattform:"Vinted",sold:false},
{id:3,name:"3DS Black/Ovp",ek:105.39,plattform:"Vinted",sold:false},
{id:4,name:"DS i XL Oro",ek:35.83,plattform:"Vinted",sold:false},
{id:5,name:"N3DS XL Orange/Ovp",ek:217.65,plattform:"Vinted",sold:false},
{id:6,name:"PSP 2004 Black",ek:55.14,plattform:"Vinted",sold:false},
{id:7,name:"PS Vita Blau",ek:105.39,plattform:"Vinted",sold:false},
{id:8,name:"Xbox 360/Ovp",ek:47.64,plattform:"Vinted",sold:false},
{id:9,name:"GBA SP Silber/Muster",ek:52.89,plattform:"Vinted",sold:false},
{id:10,name:"Switch Blau/Gelb Joycon",ek:79.14,plattform:"Vinted",sold:false}
];

let sales=[];

function render(){

sellSelect.innerHTML=inventory.filter(x=>!x.sold)
.map(x=>`<option value="${x.id}">${x.name}</option>`).join("");

lagerTable.innerHTML=`
<table>
<tr><th>Artikel</th><th>EK</th><th>Plattform</th><th>Status</th></tr>
${inventory.map(x=>`
<tr class="${x.sold?'sold':''}">
<td>${x.name}</td>
<td class="right">${money(x.ek)} €</td>
<td>${x.plattform}</td>
<td>${x.sold?'Verkauft':'Im Lager'}</td>
</tr>
`).join("")}
</table>
`;

let revenue=sales.reduce((s,x)=>s+x.price,0);
let cogs=sales.reduce((s,x)=>s+x.ek,0);
let profit=revenue-cogs;
let tax=profit*0.4;

overview.innerHTML=`
Einnahmen: ${money(revenue)} €<br>
Wareneinsatz: ${money(cogs)} €<br>
<b>Gewinn: ${money(profit)} €</b><br>
<b>Steuer Rücklage (40%): ${money(tax)} €</b>
`;
}

function sell(){
let id=sellSelect.value;
let item=inventory.find(x=>x.id==id);
if(!item)return;

let price=parse(sellPrice.value);
let profit=price-item.ek;
let tax=profit*0.4;

item.sold=true;
sales.push({ek:item.ek,price,profit,tax});
sellPrice.value="";
result.innerHTML="Gewinn: "+money(profit)+" € | 40% Steuer: "+money(tax)+" €";
render();
}

render();
</script>

</body>
</html>
