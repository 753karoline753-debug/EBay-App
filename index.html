<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kleingewerbe Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto p-4 space-y-6">

<h1 class="text-2xl font-bold text-center">Kleingewerbe Manager</h1>

<!-- Navigation -->
<div class="flex bg-white rounded-xl shadow overflow-hidden">
<button id="btnIncome" onclick="showTab('income')" class="flex-1 py-3">Einnahmen</button>
<button id="btnExpense" onclick="showTab('expense')" class="flex-1 py-3">Ausgaben</button>
<button id="btnDashboard" onclick="showTab('dashboard')" class="flex-1 py-3">Gesamt</button>
</div>

<!-- EINNAHMEN -->
<div id="income" class="space-y-4">
<button onclick="addIncome()" class="w-full bg-black text-white py-3 rounded-xl">
+ Neuer Verkauf
</button>
<div id="incomeList" class="space-y-4"></div>
</div>

<!-- AUSGABEN -->
<div id="expense" class="hidden space-y-4">
<button onclick="addExpense()" class="w-full bg-black text-white py-3 rounded-xl">
+ Ausgabe
</button>
<div id="expenseList" class="space-y-4"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden space-y-4">
<div class="bg-white p-4 rounded-2xl shadow">
<div class="text-gray-500">Gesamtgewinn</div>
<div id="totalProfit" class="text-2xl font-bold">0 €</div>
</div>

<div class="bg-yellow-100 p-4 rounded-2xl shadow">
<div class="text-gray-500">Gesamte 40% Rücklage</div>
<div id="totalTax" class="text-xl font-bold">0 €</div>
</div>

<div class="bg-green-100 p-4 rounded-2xl shadow">
<div class="text-gray-500">Gesamt Netto</div>
<div id="totalNet" class="text-2xl font-bold">0 €</div>
</div>

<div class="bg-white p-4 rounded-2xl shadow">
<div class="text-gray-500">Anzahl Verkäufe</div>
<div id="totalCount" class="text-xl font-bold">0</div>
</div>

<div class="bg-white p-4 rounded-2xl shadow">
<div class="text-gray-500">Ø Gewinn pro Artikel</div>
<div id="avgProfit" class="text-xl font-bold">0 €</div>
</div>
</div>

</div>

<script>
const KEY="kleingewerbe_auto_save_v2";

let data = JSON.parse(localStorage.getItem(KEY)) || {
  income: [],
  expense: []
};

function save(){
  localStorage.setItem(KEY, JSON.stringify(data));
}

function euro(n){
  return n.toLocaleString("de-DE",{style:"currency",currency:"EUR"});
}

function parseNum(v){
  if(!v) return 0;
  return parseFloat(v.toString().replace(/\./g,"").replace(",", ".")) || 0;
}

function showTab(tab){
  save();
  ["income","expense","dashboard"].forEach(t=>document.getElementById(t).classList.add("hidden"));
  ["btnIncome","btnExpense","btnDashboard"].forEach(b=>document.getElementById(b).classList.remove("bg-black","text-white"));
  document.getElementById(tab).classList.remove("hidden");
  document.getElementById("btn"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("bg-black","text-white");
  updateDashboard();
}

function addIncome(){
  data.income.push({
    id:crypto.randomUUID(),
    title:"",
    date:new Date().toISOString().slice(0,10),
    sell:"",
    ek:""
  });
  save();
  renderIncome();
}

function addExpense(){
  data.expense.push({
    id:crypto.randomUUID(),
    title:"",
    date:new Date().toISOString().slice(0,10),
    amount:""
  });
  save();
  renderExpense();
}

function renderIncome(){
  const list=document.getElementById("incomeList");
  list.innerHTML="";

  data.income.forEach(r=>{
    const sell=parseNum(r.sell);
    const ek=parseNum(r.ek);
    const profit=sell-ek;
    const tax=profit>0?profit*0.4:0;
    const net=profit-tax;

    list.innerHTML+=`
    <div class="bg-white p-4 rounded-2xl shadow space-y-3">
      <input class="w-full border p-2 rounded-xl"
        value="${r.title}" placeholder="Artikel"
        oninput="updateIncome('${r.id}','title',this.value)">
      <input type="date" class="w-full border p-2 rounded-xl"
        value="${r.date}"
        onchange="updateIncome('${r.id}','date',this.value)">
      <input inputmode="decimal" class="w-full border p-2 rounded-xl"
        value="${r.sell}" placeholder="Verkaufspreis"
        oninput="updateIncome('${r.id}','sell',this.value)">
      <input inputmode="decimal" class="w-full border p-2 rounded-xl"
        value="${r.ek}" placeholder="Einkaufspreis (EK)"
        oninput="updateIncome('${r.id}','ek',this.value)">

      <div class="text-sm space-y-1">
        <div>Gewinn: <strong>${euro(profit)}</strong></div>
        <div>40% Rücklage: <strong>${euro(tax)}</strong></div>
        <div>Netto: <strong>${euro(net)}</strong></div>
      </div>

      <button onclick="deleteIncome('${r.id}')"
      class="w-full bg-red-600 text-white py-2 rounded-xl">
      Löschen
      </button>
    </div>`;
  });

  updateDashboard();
}

function renderExpense(){
  const list=document.getElementById("expenseList");
  list.innerHTML="";

  data.expense.forEach(r=>{
    list.innerHTML+=`
    <div class="bg-white p-4 rounded-2xl shadow space-y-3">
      <input class="w-full border p-2 rounded-xl"
        value="${r.title}" placeholder="Bezeichnung"
        oninput="updateExpense('${r.id}','title',this.value)">
      <input type="date" class="w-full border p-2 rounded-xl"
        value="${r.date}"
        onchange="updateExpense('${r.id}','date',this.value)">
      <input inputmode="decimal" class="w-full border p-2 rounded-xl"
        value="${r.amount}" placeholder="Betrag"
        oninput="updateExpense('${r.id}','amount',this.value)">
      <button onclick="deleteExpense('${r.id}')"
      class="w-full bg-red-600 text-white py-2 rounded-xl">
      Löschen
      </button>
    </div>`;
  });
}

function updateIncome(id,field,value){
  const row=data.income.find(r=>r.id===id);
  if(row){
    row[field]=value;
    save();
  }
  updateDashboard();
}

function updateExpense(id,field,value){
  const row=data.expense.find(r=>r.id===id);
  if(row){
    row[field]=value;
    save();
  }
  updateDashboard();
}

function deleteIncome(id){
  data.income=data.income.filter(r=>r.id!==id);
  save();
  renderIncome();
}

function deleteExpense(id){
  data.expense=data.expense.filter(r=>r.id!==id);
  save();
  renderExpense();
}

function updateDashboard(){
  let totalProfit=0;
  let totalExpense=0;

  data.income.forEach(r=>{
    totalProfit+=parseNum(r.sell)-parseNum(r.ek);
  });

  data.expense.forEach(r=>{
    totalExpense+=parseNum(r.amount);
  });

  totalProfit-=totalExpense;

  const tax=totalProfit>0?totalProfit*0.4:0;
  const net=totalProfit-tax;
  const count=data.income.length;
  const avg=count?totalProfit/count:0;

  document.getElementById("totalProfit").innerText=euro(totalProfit);
  document.getElementById("totalTax").innerText=euro(tax);
  document.getElementById("totalNet").innerText=euro(net);
  document.getElementById("totalCount").innerText=count;
  document.getElementById("avgProfit").innerText=euro(avg);
}

window.addEventListener("beforeunload", save);

renderIncome();
renderExpense();
showTab("income");
</script>

</body>
</html>
