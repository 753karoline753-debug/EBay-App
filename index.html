<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kleingewerbe App</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto p-4 space-y-6">

<h1 class="text-2xl font-bold text-center">Kleingewerbe Manager</h1>

<!-- Navigation -->
<div class="flex bg-white rounded-xl shadow overflow-hidden">
<button id="btnIncome" onclick="showTab('income')" class="flex-1 py-3">Einnahmen</button>
<button id="btnExpense" onclick="showTab('expense')" class="flex-1 py-3">Ausgaben</button>
<button id="btnDashboard" onclick="showTab('dashboard')" class="flex-1 py-3">Übersicht</button>
</div>

<!-- EINNAHMEN -->
<div id="income" class="space-y-4">

<button onclick="addIncome()" class="w-full bg-black text-white py-3 rounded-xl">
+ Einnahme
</button>

<div id="incomeList" class="space-y-4"></div>

</div>

<!-- AUSGABEN -->
<div id="expense" class="hidden space-y-4">

<button onclick="addExpense()" class="w-full bg-black text-white py-3 rounded-xl">
+ Ausgabe
</button>

<div id="expenseList" class="space-y-4"></div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden space-y-4">

<div class="bg-white p-4 rounded-2xl shadow">
<div class="text-gray-500">Gewinn gesamt</div>
<div id="profitBefore" class="text-2xl font-bold">0 €</div>
</div>

<div class="bg-yellow-100 p-4 rounded-2xl shadow">
<div class="text-gray-500">40% Steuer Rücklage</div>
<div id="tax" class="text-xl font-bold">0 €</div>
</div>

<div class="bg-green-100 p-4 rounded-2xl shadow">
<div class="text-gray-500">Gewinn nach Rücklage (nur Anzeige)</div>
<div id="profitAfter" class="text-2xl font-bold">0 €</div>
</div>

</div>

</div>

<script>
const KEY="kleingewerbe_cards_v1";
let data=JSON.parse(localStorage.getItem(KEY)||'{"income":[],"expense":[]}');

function save(){localStorage.setItem(KEY,JSON.stringify(data));}
function euro(n){return n.toLocaleString("de-DE",{style:"currency",currency:"EUR"});}
function parseNum(v){if(!v)return 0;return parseFloat(v.toString().replace(/\./g,"").replace(",", "."))||0;}

function showTab(tab){
["income","expense","dashboard"].forEach(t=>document.getElementById(t).classList.add("hidden"));
["btnIncome","btnExpense","btnDashboard"].forEach(b=>document.getElementById(b).classList.remove("bg-black","text-white"));
document.getElementById(tab).classList.remove("hidden");
document.getElementById("btn"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("bg-black","text-white");
updateDashboard();
}

function addIncome(){
data.income.push({
id:crypto.randomUUID(),
title:"",
amount:"",
date:new Date().toISOString().slice(0,10)
});
renderIncome(); save();
}

function addExpense(){
data.expense.push({
id:crypto.randomUUID(),
title:"",
amount:"",
date:new Date().toISOString().slice(0,10)
});
renderExpense(); save();
}

function renderIncome(){
const list=document.getElementById("incomeList");
list.innerHTML="";
data.income.forEach(r=>{
list.innerHTML+=`
<div class="bg-white p-4 rounded-2xl shadow space-y-3">
<input class="w-full border p-2 rounded-xl"
value="${r.title}" placeholder="Bezeichnung"
oninput="updInc('${r.id}','title',this.value)">
<input type="date" class="w-full border p-2 rounded-xl"
value="${r.date}"
onchange="updInc('${r.id}','date',this.value)">
<input inputmode="decimal" class="w-full border p-2 rounded-xl"
value="${r.amount}" placeholder="Betrag"
oninput="updInc('${r.id}','amount',this.value)">
<button onclick="delInc('${r.id}')"
class="w-full bg-red-600 text-white py-2 rounded-xl">
Löschen
</button>
</div>`;
});
}

function renderExpense(){
const list=document.getElementById("expenseList");
list.innerHTML="";
data.expense.forEach(r=>{
list.innerHTML+=`
<div class="bg-white p-4 rounded-2xl shadow space-y-3">
<input class="w-full border p-2 rounded-xl"
value="${r.title}" placeholder="Bezeichnung"
oninput="updExp('${r.id}','title',this.value)">
<input type="date" class="w-full border p-2 rounded-xl"
value="${r.date}"
onchange="updExp('${r.id}','date',this.value)">
<input inputmode="decimal" class="w-full border p-2 rounded-xl"
value="${r.amount}" placeholder="Betrag"
oninput="updExp('${r.id}','amount',this.value)">
<button onclick="delExp('${r.id}')"
class="w-full bg-red-600 text-white py-2 rounded-xl">
Löschen
</button>
</div>`;
});
}

function updInc(id,f,v){data.income.find(r=>r.id===id)[f]=v;save();updateDashboard();}
function updExp(id,f,v){data.expense.find(r=>r.id===id)[f]=v;save();updateDashboard();}
function delInc(id){data.income=data.income.filter(r=>r.id!==id);save();renderIncome();}
function delExp(id){data.expense=data.expense.filter(r=>r.id!==id);save();renderExpense();}

function updateDashboard(){
let totalIncome=0,totalExpense=0;

data.income.forEach(r=>totalIncome+=parseNum(r.amount));
data.expense.forEach(r=>totalExpense+=parseNum(r.amount));

const profitBefore=totalIncome-totalExpense;
const tax=profitBefore>0?profitBefore*0.4:0;
const profitAfter=profitBefore-tax;

document.getElementById("profitBefore").innerText=euro(profitBefore);
document.getElementById("tax").innerText=euro(tax);
document.getElementById("profitAfter").innerText=euro(profitAfter);
}

renderIncome();
renderExpense();
showTab("income");
</script>

</body>
</html>
