<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kleingewerbe Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body class="bg-gray-100">

<div id="login" class="max-w-md mx-auto mt-20 p-6">
  <div class="bg-white p-6 rounded-2xl shadow text-center space-y-4">
    <h1 class="text-2xl font-bold">Kleingewerbe Pro</h1>
    <p class="text-gray-600 text-sm">Cloud Login (Supabase)</p>
    <button id="githubLogin" class="w-full bg-black text-white py-3 rounded-xl">
      Mit GitHub einloggen
    </button>
  </div>
</div>

<div id="app" class="hidden max-w-md mx-auto mt-20 p-6">
  <div class="bg-white p-6 rounded-2xl shadow text-center space-y-4">
    <h2 class="text-xl font-bold">Eingeloggt ✅</h2>
    <p id="userEmail" class="text-sm text-gray-600"></p>
    <button id="logoutBtn" class="bg-red-600 text-white px-4 py-2 rounded-xl">
      Logout
    </button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://szcgehcjdnilykynqhqf.supabase.co";
const SUPABASE_KEY = "DEIN_ANON_KEY_HIER_EINFÜGEN"; // <-- deinen anon key hier einfügen

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Feste Redirect URL (kein window.location mehr!)
const REDIRECT_URL = "https://753karoline753-debug.github.io/EBay-App/";

document.getElementById("githubLogin").addEventListener("click", async () => {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: "github",
    options: {
      redirectTo: REDIRECT_URL
    }
  });

  if (error) {
    alert("Login Fehler: " + error.message);
  }
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await supabase.auth.signOut();
  location.reload();
});

// Session prüfen
async function checkUser() {
  const { data } = await supabase.auth.getSession();
  const session = data.session;

  if (session) {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("userEmail").textContent =
      session.user.email || session.user.id;
  }
}

checkUser();
</script>

</body>
</html>
