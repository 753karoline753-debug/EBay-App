<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>eBay Kleingewerbe App</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<div class="max-w-6xl mx-auto bg-white p-6 rounded-2xl shadow-xl">

<h1 class="text-2xl font-bold mb-6">eBay Kleingewerbe</h1>

<div class="flex gap-3 mb-6">
<button onclick="show('income')" class="bg-black text-white px-4 py-2 rounded-xl">Einnahmen</button>
<button onclick="show('expense')" class="bg-gray-200 px-4 py-2 rounded-xl">Ausgaben</button>
<button onclick="show('dashboard')" class="bg-gray-200 px-4 py-2 rounded-xl">Dashboard</button>
</div>

<!-- EINNAHMEN -->
<div id="income">
<button onclick="addIncome()" class="bg-black text-white px-4 py-2 rounded-xl mb-4">+ Verkauf</button>

<table class="w-full text-sm border">
<thead class="bg-gray-100">
<tr>
<th class="p-2">Datum</th>
<th class="p-2">Artikel</th>
<th class="p-2 text-right">Verkauf</th>
<th class="p-2 text-right">Kosten</th>
<th class="p-2 text-right">Gewinn</th>
<th></th>
</tr>
</thead>
<tbody id="incomeBody"></tbody>
</table>
</div>

<!-- AUSGABEN -->
<div id="expense" class="hidden">
<button onclick="addExpense()" class="bg-black text-white px-4 py-2 rounded-xl mb-4">+ Ausgabe</button>

<table class="w-full text-sm border">
<thead class="bg-gray-100">
<tr>
<th class="p-2">Datum</th>
<th class="p-2">Kategorie</th>
<th class="p-2 text-right">Betrag</th>
<th></th>
</tr>
</thead>
<tbody id="expenseBody"></tbody>
</table>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="grid grid-cols-1 md:grid-cols-4 gap-4">

<div class="bg-gray-100 p-4 rounded-xl">
<div>Gewinn gesamt</div>
<div id="totalProfit" class="font-bold text-xl">0 €</div>
</div>

<div class="bg-yellow-100 p-4 rounded-xl">
<div>40% Rücklage</div>
<div id="totalTax" class="font-bold text-xl">0 €</div>
</div>

<div class="bg-gray-100 p-4 rounded-xl">
<div>Ausgaben gesamt</div>
<div id="totalExpense" class="font-bold text-xl">0 €</div>
</div>

<div class="bg-blue-100 p-4 rounded-xl">
<div>Jahres-Prognose</div>
<div id="forecast" class="font-bold text-xl">0 €</div>
</div>

</div>

</div>

</div>

<script>
const KEY="ebay_app_v2";
let data=JSON.parse(localStorage.getItem(KEY)||'{"income":[],"expense":[]}');

function save(){
localStorage.setItem(KEY,JSON.stringify(data));
}

function euro(n){
return n.toLocaleString("de-DE",{style:"currency",currency:"EUR"});
}

function parseNumber(v){
if(!v)return 0;
return parseFloat(v.toString().replace(/\./g,"").replace(",", "."))||0;
}

function show(tab){
document.getElementById("income").classList.add("hidden");
document.getElementById("expense").classList.add("hidden");
document.getElementById("dashboard").classList.add("hidden");
document.getElementById(tab).classList.remove("hidden");
updateDashboard();
}

function addIncome(){
data.income.push({
id:crypto.randomUUID(),
date:new Date().toISOString().slice(0,10),
item:"",
sell:"",
cost:""
});
renderIncome();
save();
}

function addExpense(){
data.expense.push({
id:crypto.randomUUID(),
date:new Date().toISOString().slice(0,10),
cat:"",
amount:""
});
renderExpense();
save();
}

function renderIncome(){
const body=document.getElementById("incomeBody");
body.innerHTML="";
data.income.forEach(row=>{
const tr=document.createElement("tr");

const sell=parseNumber(row.sell);
const cost=parseNumber(row.cost);
const profit=sell-cost;

tr.innerHTML=`
<td class="p-2"><input type="date" value="${row.date}" onchange="updateIncome('${row.id}','date',this.value)"></td>
<td class="p-2"><input value="${row.item}" oninput="updateIncome('${row.id}','item',this.value)"></td>
<td class="p-2 text-right"><input value="${row.sell}" inputmode="decimal" oninput="updateIncome('${row.id}','sell',this.value)"></td>
<td class="p-2 text-right"><input value="${row.cost}" inputmode="decimal" oninput="updateIncome('${row.id}','cost',this.value)"></td>
<td class="p-2 text-right font-semibold">${euro(profit)}</td>
<td><button onclick="delIncome('${row.id}')" class="bg-red-600 text-white px-2 py-1 rounded">X</button></td>
`;
body.appendChild(tr);
});
updateDashboard();
}

function renderExpense(){
const body=document.getElementById("expenseBody");
body.innerHTML="";
data.expense.forEach(row=>{
const tr=document.createElement("tr");
tr.innerHTML=`
<td class="p-2"><input type="date" value="${row.date}" onchange="updateExpense('${row.id}','date',this.value)"></td>
<td class="p-2"><input value="${row.cat}" oninput="updateExpense('${row.id}','cat',this.value)"></td>
<td class="p-2 text-right"><input value="${row.amount}" inputmode="decimal" oninput="updateExpense('${row.id}','amount',this.value)"></td>
<td><button onclick="delExpense('${row.id}')" class="bg-red-600 text-white px-2 py-1 rounded">X</button></td>
`;
body.appendChild(tr);
});
updateDashboard();
}

function updateIncome(id,field,value){
const row=data.income.find(r=>r.id===id);
row[field]=value;
save();
updateDashboard();
}

function updateExpense(id,field,value){
const row=data.expense.find(r=>r.id===id);
row[field]=value;
save();
updateDashboard();
}

function delIncome(id){
data.income=data.income.filter(r=>r.id!==id);
save();
renderIncome();
}

function delExpense(id){
data.expense=data.expense.filter(r=>r.id!==id);
save();
renderExpense();
}

function updateDashboard(){
let profit=0;
let expenseTotal=0;

data.income.forEach(r=>{
profit+=parseNumber(r.sell)-parseNumber(r.cost);
});

data.expense.forEach(r=>{
expenseTotal+=parseNumber(r.amount);
});

const net=profit-expenseTotal;
const tax=net>0?net*0.4:0;

const month=new Date().getMonth()+1;
const forecast=(net/month)*12;

document.getElementById("totalProfit").innerText=euro(net);
document.getElementById("totalTax").innerText=euro(tax);
document.getElementById("totalExpense").innerText=euro(expenseTotal);
document.getElementById("forecast").innerText=euro(forecast);
}

renderIncome();
renderExpense();
updateDashboard();
</script>

</body>
</html>
