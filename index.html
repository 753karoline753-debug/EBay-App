<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kleingewerbe Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; text-align:center; padding-top:100px;">

  <h1>Kleingewerbe Pro</h1>

  <button onclick="login()" style="padding:15px 30px; font-size:18px;">
    Mit GitHub einloggen
  </button>

  <p id="status">❌ Nicht eingeloggt</p>

  <script>
    const supabase = window.supabase.createClient(
      "https://szcgehcjdnilykynqhqf.supabase.co",
      "DEIN_ANON_KEY_HIER_EINFÜGEN"
    );

    async function login() {
      await supabase.auth.signInWithOAuth({
        provider: "github",
        options: {
          redirectTo: "https://753karoline753-debug.github.io/EBay-App/"
        }
      });
    }

    supabase.auth.getSession().then(({ data }) => {
      if (data.session) {
        document.getElementById("status").innerHTML = "✅ Eingeloggt";
      }
    });
  </script>

</body>
</html>
