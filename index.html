<!DOCTYPE <!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kleingewerbe Pro Ultimate</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0}
.nav{display:flex;background:#000}
.nav button{flex:1;padding:12px;border:none;background:#000;color:#fff;font-size:12px}
.section{display:none;padding:15px}
.active{display:block}
.card{background:#fff;padding:10px;border-radius:8px;margin-bottom:8px}
input,select{width:100%;padding:8px;margin:4px 0}
button.action{background:#000;color:#fff;border:none;padding:8px;margin-top:4px}
button.small{padding:5px 8px;font-size:12px;margin-right:5px}
.summary{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
.sold{text-decoration:line-through;color:gray}
h2{margin:5px 0}
</style>
</head>
<body>

<div class="nav">
<button onclick="showTab('dashboard')">📊 Übersicht</button>
<button onclick="showTab('lager')">📦 Lager</button>
<button onclick="showTab('verkauf')">💰 Verkauf</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Gesamtübersicht</h2>
<div class="summary" id="gesamtInfo"></div>
</div>

<!-- LAGER -->
<div id="lager" class="section">
<h2>Artikel hinzufügen</h2>

<input id="lagerName" placeholder="Artikelname">
<input id="lagerEK" type="number" placeholder="Einkaufspreis €">
<input id="lagerPlattform" placeholder="Plattform">
<input id="lagerDatum" type="date">
<input id="lagerZahlung" placeholder="Bezahlart">

<button class="action" onclick="addLager()">Speichern</button>

<h2>Bestand</h2>
<div id="lagerListe"></div>
</div>

<!-- VERKAUF -->
<div id="verkauf" class="section">
<h2>Artikel verkaufen</h2>
<select id="verkaufArtikel"></select>
<input id="verkaufPreis" type="number" placeholder="Verkaufspreis €">
<input id="ebayProzent" type="number" value="10">
<button class="action" onclick="verkaufen()">Verkaufen</button>
<div id="verkaufErgebnis"></div>
</div>

<script>

let lager = JSON.parse(localStorage.getItem("lager")) || [];
let verkauftListe = JSON.parse(localStorage.getItem("verkauft")) || [];

function saveAll(){
localStorage.setItem("lager",JSON.stringify(lager));
localStorage.setItem("verkauft",JSON.stringify(verkauftListe));
updateDashboard();
}

function showTab(tab){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(tab).classList.add("active");
}

function addLager(){
lager.push({
name:lagerName.value,
ek:parseFloat(lagerEK.value)||0,
plattform:lagerPlattform.value,
datum:lagerDatum.value,
zahlung:lagerZahlung.value,
verkauft:false
});

lagerName.value="";
lagerEK.value="";
lagerPlattform.value="";
lagerDatum.value="";
lagerZahlung.value="";

saveAll();
renderLager();
}

function renderLager(){

lagerListe.innerHTML="";
verkaufArtikel.innerHTML="";

lager.forEach((a,i)=>{

let klasse = a.verkauft ? "sold" : "";

lagerListe.innerHTML += `
<div class="card ${klasse}">
<input value="${a.name}" onchange="editArtikel(${i},'name',this.value)">
<input type="number" value="${a.ek}" onchange="editArtikel(${i},'ek',this.value)">
<input value="${a.plattform}" onchange="editArtikel(${i},'plattform',this.value)">
<input type="date" value="${a.datum}" onchange="editArtikel(${i},'datum',this.value)">
<input value="${a.zahlung}" onchange="editArtikel(${i},'zahlung',this.value)">
<p>Status: ${a.verkauft ? "Verkauft" : "Im Lager"}</p>

<button class="small" onclick="toggleStatus(${i})">Status ändern</button>
<button class="small" onclick="deleteArtikel(${i})">Löschen</button>
</div>
`;

if(!a.verkauft){
verkaufArtikel.innerHTML += `<option value="${i}">${a.name}</option>`;
}

});
}

function editArtikel(index, feld, wert){
if(feld==="ek") wert=parseFloat(wert)||0;
lager[index][feld]=wert;
saveAll();
}

function toggleStatus(index){
lager[index].verkauft = !lager[index].verkauft;
saveAll();
renderLager();
}

function deleteArtikel(index){
if(confirm("Artikel wirklich löschen?")){
lager.splice(index,1);
saveAll();
renderLager();
}
}

function verkaufen(){

let index = verkaufArtikel.value;
let artikel = lager[index];

let preis = parseFloat(verkaufPreis.value)||0;
let prozent = parseFloat(ebayProzent.value)||10;
let ebayGeb = (preis*prozent/100)+0.42;
let gewinn = preis - artikel.ek - ebayGeb;

artikel.verkauft = true;

verkauftListe.push({
datum:new Date(),
name:artikel.name,
ek:artikel.ek,
preis,
gewinn
});

saveAll();
renderLager();

verkaufErgebnis.innerHTML="Gewinn: "+gewinn.toFixed(2)+" €";
}

function updateDashboard(){

let einnahmen = verkauftListe.reduce((s,v)=>s+v.preis,0);
let wareneinsatz = verkauftListe.reduce((s,v)=>s+v.ek,0);
let gewinn = einnahmen - wareneinsatz;
let steuer = gewinn*0.4;

gesamtInfo.innerHTML=
"Einnahmen: "+einnahmen.toFixed(2)+" €<br>"+
"Wareneinsatz: "+wareneinsatz.toFixed(2)+" €<br>"+
"<b>Gewinn: "+gewinn.toFixed(2)+" €</b><br>"+
"Steuer Rücklage (40%): "+steuer.toFixed(2)+" €";

}

renderLager();
updateDashboard();

</script>

</body>
</html>
