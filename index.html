<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kleingewerbe Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
<div class="max-w-xl mx-auto p-4 space-y-5">

<h1 class="text-2xl font-bold text-center">Kleingewerbe Manager</h1>

<div class="flex bg-white rounded-xl shadow overflow-hidden">
<button id="b1" class="flex-1 py-3" onclick="tab('stock')">Lager</button>
<button id="b2" class="flex-1 py-3" onclick="tab('sales')">Verkäufe</button>
<button id="b3" class="flex-1 py-3" onclick="tab('exp')">Ausgaben</button>
<button id="b4" class="flex-1 py-3" onclick="tab('dash')">Übersicht</button>
</div>

<div id="stock" class="space-y-4"></div>
<div id="sales" class="hidden space-y-4"></div>
<div id="exp" class="hidden space-y-4"></div>
<div id="dash" class="hidden space-y-4"></div>

</div>

<script>
const KEY="kleingewerbe_final";
let state=JSON.parse(localStorage.getItem(KEY)||'{"stock":[],"sales":[],"exp":[]}');

function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function euro(n){return (n||0).toLocaleString("de-DE",{style:"currency",currency:"EUR"});}
function num(v){return parseFloat((v||"0").toString().replace(",", "."))||0;}
function id(){return crypto.randomUUID();}

function tab(t){
["stock","sales","exp","dash"].forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(t).classList.remove("hidden");
render();
}

/* ---------- LAGER ---------- */

function addStock(){
state.stock.push({id:id(),name:"",ek:"",qty:"1",edit:true,active:true});
save();render();
}

function toggleEdit(i){
state.stock[i].edit=!state.stock[i].edit;
save();render();
}

function delStock(i){
const used=state.sales.some(s=>s.itemId===state.stock[i].id);
if(used){
alert("Artikel wurde verkauft und wird deaktiviert.");
state.stock[i].active=false;
}else{
state.stock.splice(i,1);
}
save();render();
}

/* ---------- VERKÄUFE ---------- */

function addSale(){
state.sales.push({id:id(),itemId:"",qty:"1",sell:"",shipC:"",ek:"",fees:"",ship:""});
save();render();
}

function profit(s){
return (num(s.sell)+num(s.shipC))-(num(s.ek)*num(s.qty))-num(s.fees)-num(s.ship);
}

/* ---------- AUSGABEN ---------- */

function addExp(){
state.exp.push({id:id(),title:"",amount:""});
save();render();
}

/* ---------- RENDER ---------- */

function render(){

/* LAGER */
document.getElementById("stock").innerHTML=
`<button class="w-full bg-black text-white py-3 rounded-xl" onclick="addStock()">+ Lagerartikel</button>`+
state.stock.map((s,i)=>`
<div class="bg-white p-4 rounded-2xl shadow space-y-2">
<div class="flex justify-between">
<b>${s.name||"Ohne Name"}</b>
<div class="flex gap-2">
<button class="text-xs bg-black text-white px-3 py-2 rounded-xl" onclick="toggleEdit(${i})">${s.edit?"Fertig":"Bearbeiten"}</button>
<button class="text-xs bg-red-600 text-white px-3 py-2 rounded-xl" onclick="delStock(${i})">Löschen</button>
</div>
</div>
${s.edit?`
<input class="w-full border p-2 rounded-xl" placeholder="Name" value="${s.name}" oninput="state.stock[${i}].name=this.value;save();render()">
<input class="w-full border p-2 rounded-xl" placeholder="EK pro Stück" value="${s.ek}" oninput="state.stock[${i}].ek=this.value;save();render()">
<input class="w-full border p-2 rounded-xl" placeholder="Bestand" value="${s.qty}" oninput="state.stock[${i}].qty=this.value;save();render()">
`:""}
<div class="text-xs text-gray-500">Bestand: ${s.qty} • EK: ${euro(num(s.ek))} ${s.active===false?"• Deaktiviert":""}</div>
</div>`).join("");

/* SALES */
document.getElementById("sales").innerHTML=
`<button class="w-full bg-black text-white py-3 rounded-xl" onclick="addSale()">+ Verkauf</button>`+
state.sales.map((s,i)=>`
<div class="bg-white p-4 rounded-2xl shadow space-y-2">
<select class="w-full border p-2 rounded-xl" onchange="state.sales[${i}].itemId=this.value;let it=state.stock.find(x=>x.id==this.value);if(it){state.sales[${i}].ek=it.ek;}save();render()">
<option value="">Artikel wählen</option>
${state.stock.filter(x=>x.active!==false).map(x=>`
<option value="${x.id}" ${x.id===s.itemId?"selected":""}>${x.name} • Bestand ${x.qty}</option>`).join("")}
</select>
<input class="w-full border p-2 rounded-xl" placeholder="Menge" value="${s.qty}" oninput="state.sales[${i}].qty=this.value;save();render()">
<input class="w-full border p-2 rounded-xl" placeholder="Verkaufspreis" value="${s.sell}" oninput="state.sales[${i}].sell=this.value;save();render()">
<input class="w-full border p-2 rounded-xl" placeholder="Versand vom Kunden" value="${s.shipC}" oninput="state.sales[${i}].shipC=this.value;save();render()">
<input class="w-full border p-2 rounded-xl" placeholder="Gebühren" value="${s.fees}" oninput="state.sales[${i}].fees=this.value;save();render()">
<input class="w-full border p-2 rounded-xl" placeholder="Versandkosten" value="${s.ship}" oninput="state.sales[${i}].ship=this.value;save();render()">
<div class="text-sm">
Gewinn: <b>${euro(profit(s))}</b><br>
40% Rücklage: <b>${euro(profit(s)*0.4)}</b><br>
Netto: <b>${euro(profit(s)*0.6)}</b>
</div>
<button class="w-full bg-red-600 text-white py-2 rounded-xl" onclick="state.sales.splice(${i},1);save();render()">Löschen</button>
</div>`).join("");

/* AUSGABEN */
document.getElementById("exp").innerHTML=
`<button class="w-full bg-black text-white py-3 rounded-xl" onclick="addExp()">+ Ausgabe</button>`+
state.exp.map((e,i)=>`
<div class="bg-white p-4 rounded-2xl shadow space-y-2">
<input class="w-full border p-2 rounded-xl" placeholder="Beschreibung" value="${e.title}" oninput="state.exp[${i}].title=this.value;save();render()">
<input class="w-full border p-2 rounded-xl" placeholder="Betrag" value="${e.amount}" oninput="state.exp[${i}].amount=this.value;save();render()">
<button class="w-full bg-red-600 text-white py-2 rounded-xl" onclick="state.exp.splice(${i},1);save();render()">Löschen</button>
</div>`).join("");

/* DASHBOARD */
let salesProfit=state.sales.reduce((a,s)=>a+profit(s),0);
let expenses=state.exp.reduce((a,e)=>a+num(e.amount),0);
let total=salesProfit-expenses;
let stockValue=state.stock.reduce((a,s)=>a+(num(s.ek)*num(s.qty)),0);

document.getElementById("dash").innerHTML=`
<div class="bg-white p-4 rounded-2xl shadow">
Gewinn: <b>${euro(total)}</b>
</div>
<div class="bg-yellow-100 p-4 rounded-2xl shadow">
40% Rücklage: <b>${euro(total*0.4)}</b>
</div>
<div class="bg-green-100 p-4 rounded-2xl shadow">
Netto: <b>${euro(total*0.6)}</b>
</div>
<div class="bg-white p-4 rounded-2xl shadow">
Lagerwert: <b>${euro(stockValue)}</b>
</div>`;
}

tab("stock");
</script>
</body>
</html>
