<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business App</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto p-4 space-y-4">

<h1 class="text-2xl font-bold text-center">Business Manager</h1>

<div class="flex bg-white rounded-xl shadow overflow-hidden">
<button onclick="showTab('lager')" class="flex-1 py-3">Lager</button>
<button onclick="showTab('verkauf')" class="flex-1 py-3">Verkäufe</button>
<button onclick="showTab('kosten')" class="flex-1 py-3">Kosten</button>
<button onclick="showTab('uebersicht')" class="flex-1 py-3">Übersicht</button>
</div>

<div id="content"></div>

</div>

<script>
let state = {
lager: [],
verkaeufe: [],
kosten: []
};

function save(){
localStorage.setItem("businessApp", JSON.stringify(state));
}

function load(){
const d = localStorage.getItem("businessApp");
if(d) state = JSON.parse(d);
}

function euro(x){
return Number(x||0).toLocaleString("de-DE",{style:"currency",currency:"EUR"});
}

function showTab(name){
const c = document.getElementById("content");

if(name==="lager"){
c.innerHTML = `
<button onclick="addLager()" class="w-full bg-black text-white py-2 rounded-xl mb-3">+ Artikel</button>
${state.lager.map((a,i)=>`
<div class="bg-white p-3 rounded-xl mb-3 shadow space-y-2">
<input placeholder="Name" value="${a.name}" oninput="state.lager[${i}].name=this.value;save()">
<input placeholder="EK" type="number" value="${a.ek}" oninput="state.lager[${i}].ek=this.value;save()">
<input placeholder="Menge" type="number" value="${a.menge}" oninput="state.lager[${i}].menge=this.value;save()">
</div>`).join("")}
`;
}

if(name==="verkauf"){
c.innerHTML = `
<button onclick="addVerkauf()" class="w-full bg-black text-white py-2 rounded-xl mb-3">+ Verkauf</button>
${state.verkaeufe.map((v,i)=>`
<div class="bg-white p-3 rounded-xl mb-3 shadow space-y-2">
<select onchange="state.verkaeufe[${i}].artikel=this.value;save()">
<option value="">Artikel wählen</option>
${state.lager.map(l=>`<option ${v.artikel===l.name?"selected":""}>${l.name}</option>`)}
</select>
<input placeholder="Verkaufspreis" type="number" value="${v.preis}" oninput="state.verkaeufe[${i}].preis=this.value;save()">
<input placeholder="eBay Gebühren" type="number" value="${v.gebuehr}" oninput="state.verkaeufe[${i}].gebuehr=this.value;save()">
<input placeholder="Versandkosten" type="number" value="${v.versand}" oninput="state.verkaeufe[${i}].versand=this.value;save()">
<div class="font-bold">Gewinn: ${euro(calcGewinn(v))}</div>
</div>`).join("")}
`;
}

if(name==="kosten"){
c.innerHTML = `
<button onclick="addKosten()" class="w-full bg-black text-white py-2 rounded-xl mb-3">+ Kosten</button>
${state.kosten.map((k,i)=>`
<div class="bg-white p-3 rounded-xl mb-3 shadow space-y-2">
<input placeholder="Beschreibung" value="${k.text}" oninput="state.kosten[${i}].text=this.value;save()">
<input placeholder="Betrag" type="number" value="${k.betrag}" oninput="state.kosten[${i}].betrag=this.value;save()">
</div>`).join("")}
`;
}

if(name==="uebersicht"){
const gewinn = state.verkaeufe.reduce((s,v)=>s+calcGewinn(v),0);
const kosten = state.kosten.reduce((s,k)=>s+Number(k.betrag||0),0);
const netto = gewinn - kosten;
const steuer = netto*0.4;

c.innerHTML = `
<div class="bg-white p-4 rounded-xl shadow space-y-2">
<div>Gewinn Verkäufe: <b>${euro(gewinn)}</b></div>
<div>Sonstige Kosten: <b>${euro(kosten)}</b></div>
<div class="text-lg">Netto: <b>${euro(netto)}</b></div>
<div class="text-red-600">40% Rücklage: <b>${euro(steuer)}</b></div>
<div class="text-green-600">Verfügbar: <b>${euro(netto-steuer)}</b></div>
</div>
`;
}
}

function calcGewinn(v){
const artikel = state.lager.find(a=>a.name===v.artikel);
const ek = artikel ? Number(artikel.ek||0) : 0;
return Number(v.preis||0) - ek - Number(v.gebuehr||0) - Number(v.versand||0);
}

function addLager(){
state.lager.push({name:"",ek:0,menge:0});
save();
showTab("lager");
}

function addVerkauf(){
state.verkaeufe.push({artikel:"",preis:0,gebuehr:0,versand:0});
save();
showTab("verkauf");
}

function addKosten(){
state.kosten.push({text:"",betrag:0});
save();
showTab("kosten");
}

load();
showTab("lager");
</script>

</body>
</html>
