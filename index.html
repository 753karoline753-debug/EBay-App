<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kleingewerbe Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; text-align:center; padding-top:100px;">

  <h1>Kleingewerbe Pro</h1>

  <button onclick="login()" style="padding:15px 30px; font-size:18px;">
    Mit GitHub einloggen
  </button>

  <p id="status">🔄 Prüfe Login...</p>

  <script>
    const supabase = window.supabase.createClient(
      "https://szcgehcjdnilykynqhqf.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6Y2dlaGNqZG5pbHlreW5xaHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwOTkwODgsImV4cCI6MjA4NzY3NTA4OH0.46uxkT1a9GhyDqEBlWJBqoIhfsthyLC2dg_nEDMWdJo"
    );

    async function login() {
      await supabase.auth.signInWithOAuth({
        provider: "github"
      });
    }

    async function checkUser() {
      const { data } = await supabase.auth.getSession();

      if (data.session) {
        document.getElementById("status").innerHTML = "✅ Eingeloggt";
      } else {
        document.getElementById("status").innerHTML = "❌ Nicht eingeloggt";
      }
    }

    checkUser();
  </script>

</body>
</html>
