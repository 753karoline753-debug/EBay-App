<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>eBay Kleingewerbe – Ultimate Business App</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">

<div class="max-w-7xl mx-auto bg-white rounded-2xl shadow-xl p-6">
<h1 class="text-2xl font-bold mb-4">eBay Kleingewerbe – Ultimate Business App (§19)</h1>

<div class="flex flex-wrap gap-3 mb-6">
<select id="yearSelect" class="border px-3 py-2 rounded-xl" onchange="renderAll()"></select>
<button onclick="showTab('dashboard')" class="px-4 py-2 rounded-xl bg-black text-white">Dashboard</button>
<button onclick="showTab('euer')" class="px-4 py-2 rounded-xl bg-gray-200">EÜR</button>
</div>

<div id="dashboardSection">
<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
<div class="bg-gray-100 p-4 rounded-xl">
<div>Jahresumsatz</div>
<div id="yearRevenue" class="font-bold">0 €</div>
</div>
<div class="bg-gray-100 p-4 rounded-xl">
<div>Jahresgewinn</div>
<div id="yearProfit" class="font-bold">0 €</div>
</div>
<div class="bg-yellow-100 p-4 rounded-xl">
<div>Steuer Rücklage (40%)</div>
<div id="yearTax" class="font-bold">0 €</div>
</div>
<div class="bg-blue-100 p-4 rounded-xl">
<div>Einkommensteuer Prognose*</div>
<div id="incomeTaxEstimate" class="font-bold">0 €</div>
</div>
</div>

<div class="mb-6">
<div id="kuWarning" class="p-4 rounded-xl hidden"></div>
</div>

<canvas id="profitChart" height="100"></canvas>
</div>

<div id="euerSection" class="hidden">
<h2 class="text-xl font-semibold mb-4">EÜR Übersicht</h2>
<div id="euerSummary" class="text-lg"></div>
</div>

</div>

<script>
const STORAGE_KEY="ebay_ultimate_app";
let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{\"income\":[],\"expense\":[]}");

function euro(n){return n.toLocaleString('de-DE',{style:'currency',currency:'EUR'});} 
function parseGerman(v){if(!v)return 0;return parseFloat(v.toString().replace(/\./g,'').replace(',','.'))||0;}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}

function showTab(tab){
 document.getElementById('dashboardSection').classList.toggle('hidden',tab!=='dashboard');
 document.getElementById('euerSection').classList.toggle('hidden',tab!=='euer');
}

function initYears(){
 const select=document.getElementById('yearSelect');
 const currentYear=new Date().getFullYear();
 for(let y=currentYear-2;y<=currentYear+1;y++){
 const opt=document.createElement('option');
 opt.value=y; opt.textContent=y;
 if(y===currentYear) opt.selected=true;
 select.appendChild(opt);
 }
}

function calculate(){
 const year=parseInt(document.getElementById('yearSelect').value);
 let revenue=0,expense=0;
 let monthlyProfit=Array(12).fill(0);

 data.income.forEach(r=>{
 if(!r.date) return;
 const d=new Date(r.date);
 if(d.getFullYear()===year){
 const amount=parseGerman(r.amount);
 revenue+=amount;
 monthlyProfit[d.getMonth()]+=amount;
 }
 });

 data.expense.forEach(r=>{
 if(!r.date) return;
 const d=new Date(r.date);
 if(d.getFullYear()===year){
 const amount=parseGerman(r.amount);
 expense+=amount;
 monthlyProfit[d.getMonth()]-=amount;
 }
 });

 const profit=revenue-expense;
 const taxReserve=profit>0?profit*0.4:0;

 // Kleinunternehmer Warnung 22.000 € Grenze
 const warning=document.getElementById('kuWarning');
 if(revenue>20000){
 warning.className='p-4 rounded-xl bg-red-200';
 warning.innerText='⚠ Achtung: Du näherst dich der 22.000 € Kleinunternehmer-Grenze!';
 } else if(revenue>17000){
 warning.className='p-4 rounded-xl bg-yellow-200';
 warning.innerText='Hinweis: Umsatz steigt Richtung Kleinunternehmer-Grenze.';
 } else {
 warning.className='hidden';
 }

 // Einkommensteuer grobe Schätzung (vereinfacht)
 let incomeTax=0;
 if(profit>10908) incomeTax=(profit-10908)*0.2;

 return {revenue,expense,profit,taxReserve,incomeTax,monthlyProfit};
}

let chart;
function renderAll(){
 const {revenue,expense,profit,taxReserve,incomeTax,monthlyProfit}=calculate();

 document.getElementById('yearRevenue').innerText=euro(revenue);
 document.getElementById('yearProfit').innerText=euro(profit);
 document.getElementById('yearTax').innerText=euro(taxReserve);
 document.getElementById('incomeTaxEstimate').innerText=euro(incomeTax);

 document.getElementById('euerSummary').innerHTML=
 `Einnahmen: ${euro(revenue)}<br>Ausgaben: ${euro(expense)}<br>Gewinn: ${euro(profit)}`;

 const ctx=document.getElementById('profitChart');
 if(chart) chart.destroy();
 chart=new Chart(ctx,{
 type:'line',
 data:{
 labels:['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'],
 datasets:[{label:'Monatsgewinn',data:monthlyProfit,borderWidth:2,fill:false}]
 }
 });
}

initYears();
renderAll();
</script>

</body>
</html>
