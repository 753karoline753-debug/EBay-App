<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reseller Rechner</title>

<style>
body{font-family:system-ui;margin:15px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid #ddd;padding:6px}
th{background:#f4f4f4;text-align:left}
input{width:100%;padding:5px}
.num{text-align:right}
button{padding:6px 10px;margin:5px 5px 5px 0}
tfoot td{font-weight:bold;border-top:2px solid #000}
</style>
</head>

<body>

<h2>Reseller Rechner (10% eBay / 40% Steuer)</h2>

<button onclick="addItem()">+ Neues Produkt</button>
<button onclick="resetData()">Alles löschen</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Artikel</th>
<th class="num">Kauf €</th>
<th class="num">Verkauf €</th>
<th class="num">eBay 10%</th>
<th class="num">Gewinn</th>
<th class="num">Steuer 40%</th>
<th class="num">Netto</th>
<th>❌</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr>
<td colspan="2">SUMME</td>
<td class="num" id="sumBuy">0</td>
<td class="num" id="sumSell">0</td>
<td class="num" id="sumFee">0</td>
<td class="num" id="sumProfit">0</td>
<td class="num" id="sumTax">0</td>
<td class="num" id="sumNet">0</td>
<td></td>
</tr>
</tfoot>
</table>

<script>

const STORAGE_KEY = "reseller_app_data";

let rows = loadData();

function loadData(){
let saved = localStorage.getItem(STORAGE_KEY);
if(saved){
return JSON.parse(saved);
}
return [];
}

function saveData(){
localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
}

function render(){

let tbody=document.getElementById("tbody");
tbody.innerHTML="";

let sumBuy=0,sumSell=0,sumFee=0,sumProfit=0,sumTax=0,sumNet=0;

rows.forEach((r,i)=>{

let fee=r.sell*0.10;
let profit=r.sell-r.buy-fee;
let tax=profit>0?profit*0.40:0;
let net=profit-tax;

sumBuy+=r.buy;
sumSell+=r.sell;
sumFee+=fee;
sumProfit+=profit;
sumTax+=tax;
sumNet+=net;

tbody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td><input value="${r.item}" oninput="updateItem(${i},this.value)"></td>
<td><input type="number" step="0.01" value="${r.buy}" oninput="updateBuy(${i},this.value)"></td>
<td><input type="number" step="0.01" value="${r.sell}" oninput="updateSell(${i},this.value)"></td>
<td class="num">${fee.toFixed(2)}</td>
<td class="num">${profit.toFixed(2)}</td>
<td class="num">${tax.toFixed(2)}</td>
<td class="num">${net.toFixed(2)}</td>
<td><button onclick="deleteItem(${i})">X</button></td>
</tr>
`;
});

document.getElementById("sumBuy").innerText=sumBuy.toFixed(2);
document.getElementById("sumSell").innerText=sumSell.toFixed(2);
document.getElementById("sumFee").innerText=sumFee.toFixed(2);
document.getElementById("sumProfit").innerText=sumProfit.toFixed(2);
document.getElementById("sumTax").innerText=sumTax.toFixed(2);
document.getElementById("sumNet").innerText=sumNet.toFixed(2);

saveData();
}

function addItem(){
rows.push({item:"Neuer Artikel",buy:0,sell:0});
render();
}

function deleteItem(i){
rows.splice(i,1);
render();
}

function updateItem(i,value){
rows[i].item=value;
render();
}

function updateBuy(i,value){
rows[i].buy=parseFloat(value)||0;
render();
}

function updateSell(i,value){
rows[i].sell=parseFloat(value)||0;
render();
}

function resetData(){
if(confirm("Wirklich alles löschen?")){
localStorage.removeItem(STORAGE_KEY);
rows=[];
render();
}
}

render();

</script>

</body>
</html>
