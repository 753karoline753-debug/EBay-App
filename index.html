<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reseller Rechner</title>

<style>
body{font-family:system-ui;margin:15px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid #ddd;padding:6px}
th{background:#f4f4f4;text-align:left}
input{width:100%;padding:5px}
.num{text-align:right}
button{padding:6px 10px;margin:5px 0}
tfoot td{font-weight:bold;border-top:2px solid #000}
</style>
</head>

<body>

<h2>Reseller Rechner (10% eBay / 40% Steuer)</h2>

<table>
<thead>
<tr>
<th>#</th>
<th>Artikel</th>
<th class="num">Kauf €</th>
<th class="num">Verkauf €</th>
<th class="num">eBay 10%</th>
<th class="num">Gewinn</th>
<th class="num">Steuer 40%</th>
<th class="num">Netto</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

<tfoot>
<tr>
<td colspan="2">SUMME</td>
<td class="num" id="sumBuy">0</td>
<td class="num" id="sumSell">0</td>
<td class="num" id="sumFee">0</td>
<td class="num" id="sumProfit">0</td>
<td class="num" id="sumTax">0</td>
<td class="num" id="sumNet">0</td>
</tr>
</tfoot>
</table>

<script>

const rows = [
{no:1,item:"N3DS XL Black",buy:198.89},
{no:2,item:"N3DS XL Blau",buy:167.39},
{no:3,item:"3DS Black/Ovp",buy:105.39},
{no:4,item:"DSi XL Oro",buy:35.83},
{no:5,item:"DSi XL Oro",buy:35.83},
{no:6,item:"N3DS XL Orange/Ovp",buy:217.65},
{no:7,item:"PSP 2004 Black",buy:55.14},
{no:8,item:"PS Vita Blau",buy:105.39},
{no:9,item:"Xbox 360/Ovp",buy:47.64},
{no:10,item:"GBA SP Silber",buy:52.89},
{no:11,item:"GBA White",buy:68.99},
{no:12,item:"GBA IPS V2",buy:62.05},
{no:13,item:"GB Classic Rot",buy:51.20},
{no:14,item:"GB Classic Grün",buy:51.20},
{no:15,item:"Switch Blau/Gelb",buy:79.14},
{no:16,item:"PSP 2004",buy:22.20},
{no:17,item:"PSP 3004",buy:22.20},
{no:18,item:"PSP 3004 Türkis",buy:49.65},
{no:19,item:"PS Vita Black",buy:74.75}
];

function render(){
let tbody=document.getElementById("tbody");
tbody.innerHTML="";

let sumBuy=0,sumSell=0,sumFee=0,sumProfit=0,sumTax=0,sumNet=0;

rows.forEach((r,i)=>{

let sell=r.sell||0;
let fee=sell*0.10;
let profit=sell-r.buy-fee;
let tax=profit>0?profit*0.40:0;
let net=profit-tax;

sumBuy+=r.buy;
sumSell+=sell;
sumFee+=fee;
sumProfit+=profit;
sumTax+=tax;
sumNet+=net;

tbody.innerHTML+=`
<tr>
<td>${r.no}</td>
<td>${r.item}</td>
<td class="num">${r.buy.toFixed(2)}</td>
<td><input type="number" step="0.01" value="${sell}" onchange="updateSell(${i},this.value)"></td>
<td class="num">${fee.toFixed(2)}</td>
<td class="num">${profit.toFixed(2)}</td>
<td class="num">${tax.toFixed(2)}</td>
<td class="num">${net.toFixed(2)}</td>
</tr>
`;
});

document.getElementById("sumBuy").innerText=sumBuy.toFixed(2);
document.getElementById("sumSell").innerText=sumSell.toFixed(2);
document.getElementById("sumFee").innerText=sumFee.toFixed(2);
document.getElementById("sumProfit").innerText=sumProfit.toFixed(2);
document.getElementById("sumTax").innerText=sumTax.toFixed(2);
document.getElementById("sumNet").innerText=sumNet.toFixed(2);
}

function updateSell(i,value){
rows[i].sell=parseFloat(value)||0;
render();
}

render();

</script>

</body>
</html>
