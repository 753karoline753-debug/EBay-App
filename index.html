<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kleingewerbe App</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto p-4 space-y-6">

<h1 class="text-2xl font-bold text-center">Kleingewerbe App</h1>

<div class="flex justify-between">
<button onclick="showTab('income')" class="bg-black text-white px-4 py-2 rounded-xl">Verkäufe</button>
<button onclick="showTab('dashboard')" class="bg-gray-300 px-4 py-2 rounded-xl">Übersicht</button>
</div>

<!-- VERKÄUFE -->
<div id="income" class="space-y-4">

<button onclick="addIncome()" class="w-full bg-black text-white py-3 rounded-xl">+ Neuer Verkauf</button>

<div id="incomeList" class="space-y-4"></div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden space-y-4">

<div class="bg-white p-4 rounded-2xl shadow">
<div class="text-gray-500">Gesamtgewinn</div>
<div id="totalProfit" class="text-2xl font-bold">0 €</div>
</div>

<div class="bg-yellow-100 p-4 rounded-2xl shadow">
<div class="text-gray-500">40% Rücklage</div>
<div id="tax" class="text-2xl font-bold">0 €</div>
</div>

<div class="bg-white p-4 rounded-2xl shadow">
<div class="text-gray-500">Ø Marge</div>
<div id="avgMargin" class="text-2xl font-bold">0 %</div>
</div>

</div>

</div>

<script>
const KEY="app_clean_v1";
let data=JSON.parse(localStorage.getItem(KEY)||'{"income":[]}');

function save(){localStorage.setItem(KEY,JSON.stringify(data));}
function euro(n){return n.toLocaleString("de-DE",{style:"currency",currency:"EUR"});}
function parseNum(v){if(!v)return 0;return parseFloat(v.toString().replace(/\./g,"").replace(",", "."))||0;}

function showTab(tab){
document.getElementById("income").classList.add("hidden");
document.getElementById("dashboard").classList.add("hidden");
document.getElementById(tab).classList.remove("hidden");
updateDashboard();
}

function addIncome(){
data.income.push({
id:crypto.randomUUID(),
item:"",
sell:"",
shipCustomer:"",
buy:"",
fees:"",
shipCost:""
});
renderIncome();
save();
}

function renderIncome(){
const list=document.getElementById("incomeList");
list.innerHTML="";

data.income.forEach(r=>{
const revenue=parseNum(r.sell)+parseNum(r.shipCustomer);
const cost=parseNum(r.buy)+parseNum(r.fees)+parseNum(r.shipCost);
const profit=revenue-cost;
const margin=revenue>0?(profit/revenue*100):0;

list.innerHTML+=`
<div class="bg-white p-4 rounded-2xl shadow space-y-3">
<input class="w-full border p-2 rounded-xl" placeholder="Artikel" value="${r.item}" oninput="upd('${r.id}','item',this.value)">

<div class="grid grid-cols-2 gap-2">
<input inputmode="decimal" class="border p-2 rounded-xl" placeholder="Verkauf" value="${r.sell}" oninput="upd('${r.id}','sell',this.value)">
<input inputmode="decimal" class="border p-2 rounded-xl" placeholder="Versand Kunde" value="${r.shipCustomer}" oninput="upd('${r.id}','shipCustomer',this.value)">
<input inputmode="decimal" class="border p-2 rounded-xl" placeholder="EK" value="${r.buy}" oninput="upd('${r.id}','buy',this.value)">
<input inputmode="decimal" class="border p-2 rounded-xl" placeholder="Gebühren" value="${r.fees}" oninput="upd('${r.id}','fees',this.value)">
<input inputmode="decimal" class="border p-2 rounded-xl col-span-2" placeholder="Versandkosten" value="${r.shipCost}" oninput="upd('${r.id}','shipCost',this.value)">
</div>

<div class="flex justify-between font-semibold">
<div>Gewinn:</div>
<div>${euro(profit)}</div>
</div>

<div class="flex justify-between text-sm text-gray-600">
<div>Marge:</div>
<div>${margin.toFixed(1)}%</div>
</div>

<button onclick="del('${r.id}')" class="w-full bg-red-600 text-white py-2 rounded-xl">Löschen</button>
</div>
`;
});

updateDashboard();
}

function upd(id,f,v){
data.income.find(r=>r.id===id)[f]=v;
save();
updateDashboard();
}

function del(id){
data.income=data.income.filter(r=>r.id!==id);
save();
renderIncome();
}

function updateDashboard(){
let totalProfit=0;
let totalMargin=0;
let count=0;

data.income.forEach(r=>{
const revenue=parseNum(r.sell)+parseNum(r.shipCustomer);
const cost=parseNum(r.buy)+parseNum(r.fees)+parseNum(r.shipCost);
const profit=revenue-cost;
if(revenue>0){
totalProfit+=profit;
totalMargin+=profit/revenue*100;
count++;
}
});

const avgMargin=count?totalMargin/count:0;
const tax=totalProfit>0?totalProfit*0.4:0;

document.getElementById("totalProfit").innerText=euro(totalProfit);
document.getElementById("tax").innerText=euro(tax);
document.getElementById("avgMargin").innerText=avgMargin.toFixed(1)+" %";
}

renderIncome();
updateDashboard();
</script>

</body>
</html>
