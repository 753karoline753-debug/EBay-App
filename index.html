<script>
  const LS_KEY = "reseller_rows_v1";

  const fmt = (n) => (isFinite(n) ? n : 0).toLocaleString("de-DE", {minimumFractionDigits:2, maximumFractionDigits:2});
  const toNum = (v) => {
    if (typeof v === "number") return v;
    if (!v) return 0;
    const s = String(v).trim().replace(/\./g, "").replace(",", ".");
    const n = Number(s);
    return isFinite(n) ? n : 0;
  };

  const feePctEl = document.getElementById("feePct");
  const taxPctEl = document.getElementById("taxPct");
  const tb = document.getElementById("tb");

  // ✅ DEINE PDF DATEN
  const defaultRows = [
    {no:"1", date:"11. Jan", item:"N3DS XL Black", seller:"Vinted/houdouby", buy:"198,89", pay:"Paypal"},
    {no:"20", date:"13. Jan", item:"N3DS XL Blau", seller:"Vinted/1234kev1234", buy:"167,39", pay:"Paypal"},
    {no:"2", date:"23. Jan", item:"3DS Black/Ovp", seller:"Vinted/leocoul", buy:"105,39", pay:"Klarna"},
    {no:"3", date:"24. Jan", item:"DS i XL Oro", seller:"Vinted/soniaj230", buy:"35,83", pay:"Klarna"},
    {no:"4", date:"24. Jan", item:"DS Ii XL Oro", seller:"Vinted/soniaj230", buy:"35,83", pay:"Klarna"},
    {no:"9", date:"26. Jan", item:"N3DS XL Orange/Ovp", seller:"Vinted/fradel49", buy:"217,65", pay:"Klarna"},
    {no:"8", date:"27. Jan", item:"PSP 2004/Ovp/Black", seller:"Vinted/sonnenschein33333", buy:"55,14", pay:"Klarna"},
    {no:"6", date:"31. Jan", item:"PS Vita Blau", seller:"Vinted/mohamedali5555", buy:"105,39", pay:"Klarna"},
    {no:"7", date:"31. Jan", item:"Xbox 360/Ovp", seller:"Vinted/vinvin69130", buy:"47,64", pay:"Klarna"},
    {no:"5", date:"01. Feb", item:"GBA SP Silber/Muster", seller:"Vinted/lucie100221", buy:"52,89", pay:"Klarna"},
    {no:"10", date:"08. Feb", item:"GBA White", seller:"Vinted/smilo1986", buy:"68,99", pay:"Klarna"},
    {no:"11", date:"08. Feb", item:"Pokemon Saphir/GBA", seller:"Vinted/smilo1986", buy:"0", pay:"Klarna"},
    {no:"14", date:"08. Feb", item:"GBA/Black/IPS/V2", seller:"Vinted/katherina8888", buy:"62,05", pay:"Klarna"},
    {no:"12", date:"09. Feb", item:"GB Classic/Rot", seller:"Vinted/charlinejill", buy:"51,20", pay:"Klarna"},
    {no:"13", date:"09. Feb", item:"GB Classic/Grün", seller:"Vinted/charlinejill", buy:"51,20", pay:"Klarna"},
    {no:"15", date:"10. Feb", item:"Switch/Blau/Gelb/Joyc.", seller:"Vinted/noemie.77440", buy:"79,14", pay:"Klarna"},
    {no:"17", date:"11. Feb", item:"PSP 2004 Black", seller:"Vinted/giandox", buy:"22,20", pay:"Klarna"},
    {no:"18", date:"11. Feb", item:"PSP 3004 Black", seller:"Vinted/giandox", buy:"22,20", pay:"Klarna"},
    {no:"19", date:"13. Feb", item:"PSP 3004 Türkis", seller:"Vinted/alessiom50", buy:"49,65", pay:"Klarna"},
    {no:"16", date:"15. Feb", item:"PS Vita Black", seller:"Vinted/ronatmel", buy:"74,75", pay:"Klarna"}
  ];

  function loadRows(){
    let data = localStorage.getItem(LS_KEY);
    if(!data){
      localStorage.setItem(LS_KEY, JSON.stringify(defaultRows));
      return defaultRows;
    }
    return JSON.parse(data);
  }

  function saveRows(rows){
    localStorage.setItem(LS_KEY, JSON.stringify(rows));
  }

  function calcRow(r){
    const feePct = toNum(feePctEl.value)/100;
    const taxPct = toNum(taxPctEl.value)/100;

    const buy = toNum(r.buy);
    const sell = toNum(r.sell);

    const fee = sell * feePct;
    const profit = sell - buy - fee;
    const tax = Math.max(profit, 0) * taxPct;
    const net = profit - tax;

    return {buy, sell, fee, profit, tax, net};
  }

  function render(){
    const rows = loadRows();
    tb.innerHTML = "";

    let sumBuy=0, sumSell=0, sumFee=0, sumProfit=0, sumTax=0, sumNet=0;

    rows.forEach((r, idx) => {
      const c = calcRow(r);
      sumBuy += c.buy; sumSell += c.sell; sumFee += c.fee;
      sumProfit += c.profit; sumTax += c.tax; sumNet += c.net;

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${r.no}</td>
        <td>${r.date}</td>
        <td>${r.item}</td>
        <td>${r.seller}</td>
        <td class="num">${fmt(c.buy)}</td>
        <td>${r.pay}</td>
        <td><input value="${r.sell ?? ""}" placeholder="Verkauf €" data-k="sell" data-i="${idx}"></td>
        <td class="num">${fmt(c.fee)}</td>
        <td class="num">${fmt(c.profit)}</td>
        <td class="num">${fmt(c.tax)}</td>
        <td class="num">${fmt(c.net)}</td>
        <td></td>
        <td></td>
      `;
      tb.appendChild(tr);
    });

    document.getElementById("sumBuy").textContent = fmt(sumBuy);
    document.getElementById("sumSell").textContent = fmt(sumSell);
    document.getElementById("sumFee").textContent = fmt(sumFee);
    document.getElementById("sumProfit").textContent = fmt(sumProfit);
    document.getElementById("sumTax").textContent = fmt(sumTax);
    document.getElementById("sumNet").textContent = fmt(sumNet);
  }

  document.addEventListener("input", (e) => {
    const t = e.target;
    if (t && t.dataset && t.dataset.k){
      const rows = loadRows();
      const i = Number(t.dataset.i);
      const k = t.dataset.k;
      rows[i][k] = t.value;
      saveRows(rows);
      render();
    }
  });

  feePctEl.addEventListener("input", render);
  taxPctEl.addEventListener("input", render);

  render();
</script>
