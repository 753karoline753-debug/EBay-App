<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kleingewerbe Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto mt-20 bg-white p-6 rounded-2xl shadow text-center">

<h1 class="text-2xl font-bold mb-6">Kleingewerbe Pro</h1>

<button id="loginBtn" class="w-full bg-black text-white py-3 rounded-xl mb-4">
Mit GitHub einloggen
</button>

<div id="status" class="text-sm text-gray-600"></div>

</div>

<script>
const { createClient } = supabase

const supabaseClient = createClient(
  "https://szcgehcjdnilykynqhqf.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6Y2dlaGNqZG5pbHlreW5xaHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwOTkwODgsImV4cCI6MjA4NzY3NTA4OH0.46uxkT1a9GhyDqEBlWJBqoIhfsthyLC2dg_nEDMWdJo",
  {
    auth: {
      persistSession: true,
      detectSessionInUrl: true
    }
  }
)

document.getElementById("loginBtn").addEventListener("click", async () => {
  await supabaseClient.auth.signInWithOAuth({
    provider: "github",
    options: {
      redirectTo: window.location.origin + window.location.pathname
    }
  })
})

async function checkUser() {
  const { data } = await supabaseClient.auth.getSession()

  if (data.session) {
    document.getElementById("status").innerText =
      "✅ Eingeloggt als: " + data.session.user.email
  } else {
    document.getElementById("status").innerText =
      "❌ Nicht eingeloggt"
  }
}

checkUser()
</script>

</body>
</html>
